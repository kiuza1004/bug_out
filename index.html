<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>BugOut — 해충 퇴치기 (초음파 웹앱)</title>
  <meta name="description" content="브라우저에서 바로 재생하는 초음파 해충 퇴치 웹앱. 모기·파리·쥐·날벌레 프리셋 제공." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%A6%9F%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #0b1220;
      --bg-2: #111a2e;
      --fg: #e6edf7;
      --muted: #8a97b1;
      --accent: #34d399;
      --accent-2: #22d3ee;
      --danger: #f87171;
      --border: #1f2a44;
      --card: #0f1830;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Pretendard", "Noto Sans KR", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      background:
        radial-gradient(1200px 600px at 50% -10%, #1b2750 0%, transparent 60%),
        radial-gradient(800px 400px at 90% 110%, #0e3b3b 0%, transparent 60%),
        var(--bg);
    }
    header {
      width: 100%;
      max-width: 480px;
      text-align: center;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 6px;
      letter-spacing: -0.5px;
    }
    .sub {
      color: var(--muted);
      font-size: 13px;
    }
    main {
      width: 100%;
      max-width: 480px;
      display: grid;
      gap: 16px;
    }
    .card {
      background: linear-gradient(180deg, var(--card), var(--bg-2));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .freq {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 8px;
      margin: 8px 0 14px;
    }
    .freq .num {
      font-size: 48px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .freq .unit { color: var(--muted); font-size: 16px; }
    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 10px 0;
    }
    .row label {
      width: 70px;
      color: var(--muted);
      font-size: 13px;
    }
    input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
    }
    .val { width: 56px; text-align: right; font-variant-numeric: tabular-nums; font-size: 13px; color: var(--muted); }

    .presets { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .preset {
      background: #0c1530;
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 12px 10px;
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      transition: transform .05s ease, border-color .15s ease, background .15s ease;
    }
    .preset:hover { border-color: var(--accent-2); }
    .preset:active { transform: scale(0.98); }
    .preset.active { border-color: var(--accent); background: #0d2438; }
    .preset .name { font-weight: 600; }
    .preset .hz { color: var(--muted); font-size: 12px; margin-top: 2px; }

    .play {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      color: #04131c;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: filter .15s ease, transform .05s ease;
    }
    .play:hover { filter: brightness(1.05); }
    .play:active { transform: scale(0.99); }
    .play.stop {
      background: linear-gradient(135deg, #fb7185, #f97316);
      color: #1a0606;
    }

    .legal {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .legal b { color: #f0d68a; }

    .toggle {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .chip {
      background: #0c1530;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
    }
    .chip.active { color: var(--fg); border-color: var(--accent); }

    .reset-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      justify-self: center;
      transition: color .15s ease, border-color .15s ease;
    }
    .reset-btn:hover { color: var(--fg); border-color: var(--accent); }

    canvas#spec {
      display: block;
      width: 100%;
      height: 56px;
      background: #07101f;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin: 4px 0 12px;
    }

    footer {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
    a { color: var(--accent-2); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>🦟 BugOut</h1>
    <div class="sub">브라우저 초음파 해충 퇴치 웹앱</div>
  </header>

  <main>
    <section class="card" aria-label="현재 주파수">
      <div class="freq" aria-live="polite">
        <span class="num" id="freqDisplay">18000</span>
        <span class="unit">Hz</span>
      </div>

      <canvas id="spec" width="448" height="56" aria-hidden="true"></canvas>

      <div class="row">
        <label for="freq">주파수</label>
        <input id="freq" type="range" min="100" max="22000" step="50" value="18000" />
        <span class="val" id="freqVal">18 kHz</span>
      </div>

      <div class="row">
        <label for="vol">볼륨</label>
        <input id="vol" type="range" min="0" max="100" step="1" value="40" />
        <span class="val" id="volVal">40%</span>
      </div>

      <div class="row">
        <label for="wave">파형</label>
        <div class="toggle" id="waveToggle" role="tablist">
          <button class="chip active" data-wave="sine">Sine</button>
          <button class="chip" data-wave="square">Square</button>
          <button class="chip" data-wave="sawtooth">Saw</button>
          <button class="chip" data-wave="triangle">Tri</button>
        </div>
      </div>

      <div class="row">
        <label for="sweep">스윕</label>
        <div class="toggle" id="sweepToggle">
          <button class="chip active" data-sweep="off">Off</button>
          <button class="chip" data-sweep="slow">Slow</button>
          <button class="chip" data-sweep="fast">Fast</button>
          <button class="chip" data-sweep="random">Random</button>
        </div>
      </div>

      <div class="row">
        <label for="detune">맥놀이</label>
        <input id="detune" type="range" min="0" max="100" step="1" value="0" />
        <span class="val" id="detuneVal">0 Hz</span>
      </div>

      <div class="row">
        <label>타이머</label>
        <div class="toggle" id="timerToggle">
          <button class="chip active" data-timer="off">Off</button>
          <button class="chip" data-timer="5">5분</button>
          <button class="chip" data-timer="15">15분</button>
          <button class="chip" data-timer="30">30분</button>
        </div>
      </div>
    </section>

    <section class="card" aria-label="해충별 프리셋">
      <div class="presets" id="presets"></div>
    </section>

    <button id="play" class="play" aria-pressed="false">▶ 재생</button>

    <p class="legal">
      <b>안내:</b> 초음파의 해충 퇴치 효과는 종·환경·기기 스피커 성능에 따라 다르며 과학적 근거가 제한적입니다.
      반려동물(개·고양이·햄스터 등)이 불편해할 수 있고, 청력에 민감한 사람은 두통이 생길 수 있으니 볼륨을 낮게 시작하세요.
      이어폰/헤드폰 착용 중 고음 재생은 권장하지 않습니다.
    </p>

    <button id="reset" class="reset-btn" type="button">↺ 초기 설정으로</button>
  </main>

  <footer>
    <div>오픈소스 · <a href="https://github.com/kiuza1004/bug_out" target="_blank" rel="noopener">GitHub</a></div>
    <div style="margin-top:6px;">단축키: Space 재생 · 1~6 프리셋 · ↑↓ 주파수(Shift=±1kHz) · M 음소거</div>
  </footer>

  <script>
    const PRESETS = [
      { id: "mosquito", name: "모기", hz: 18000, wave: "sine", sweep: "slow", emoji: "🦟" },
      { id: "fly",      name: "파리", hz: 15000, wave: "sine", sweep: "off",  emoji: "🪰" },
      { id: "gnat",     name: "날파리", hz: 17000, wave: "sine", sweep: "slow", emoji: "🐝" },
      { id: "rat",      name: "쥐",   hz: 22000, wave: "square", sweep: "fast", emoji: "🐀" },
      { id: "roach",    name: "바퀴벌레", hz: 12000, wave: "sawtooth", sweep: "slow", emoji: "🪳" },
      { id: "spider",   name: "거미", hz: 20000, wave: "sine", sweep: "off",  emoji: "🕷️" },
    ];

    const $ = (id) => document.getElementById(id);
    const freqInput = $("freq");
    const freqDisplay = $("freqDisplay");
    const freqVal = $("freqVal");
    const volInput = $("vol");
    const volVal = $("volVal");
    const playBtn = $("play");
    const presetsEl = $("presets");
    const waveToggle = $("waveToggle");
    const sweepToggle = $("sweepToggle");
    const timerToggle = $("timerToggle");
    const detuneInput = $("detune");
    const detuneVal = $("detuneVal");
    const canvas = $("spec");
    const cctx = canvas.getContext("2d");

    const LS_KEY = "bugout:v1";

    const INITIAL_STATE = {
      freq: 18000,
      volume: 0.4,
      wave: "sine",
      sweep: "off",
      timer: "off",
      detune: 0,
    };

    let state = {
      ...INITIAL_STATE,
      playing: false,
    };

    let ctx = null;
    let osc = null;
    let osc2 = null;
    let gain = null;
    let analyser = null;
    let sweepTimer = null;
    let sweepDir = 1;
    let rafId = null;
    let timerHandle = null;
    let lastNonZeroVolume = 0.4;

    function saveState() {
      try {
        localStorage.setItem(LS_KEY, JSON.stringify({
          freq: state.freq, volume: state.volume,
          wave: state.wave, sweep: state.sweep, timer: state.timer,
          detune: state.detune,
        }));
      } catch {}
    }

    function loadState() {
      try {
        const s = JSON.parse(localStorage.getItem(LS_KEY) || "null");
        if (s && typeof s === "object") Object.assign(state, s);
      } catch {}
    }

    function fmtHz(hz) {
      return hz >= 1000 ? (hz / 1000).toFixed(hz % 1000 === 0 ? 0 : 1) + " kHz" : hz + " Hz";
    }

    function render() {
      freqInput.value = state.freq;
      freqDisplay.textContent = state.freq;
      freqVal.textContent = fmtHz(state.freq);
      volInput.value = Math.round(state.volume * 100);
      volVal.textContent = Math.round(state.volume * 100) + "%";
      detuneInput.value = state.detune;
      detuneVal.textContent = state.detune + " Hz";

      for (const b of waveToggle.querySelectorAll(".chip")) {
        b.classList.toggle("active", b.dataset.wave === state.wave);
      }
      for (const b of sweepToggle.querySelectorAll(".chip")) {
        b.classList.toggle("active", b.dataset.sweep === state.sweep);
      }
      for (const b of timerToggle.querySelectorAll(".chip")) {
        b.classList.toggle("active", b.dataset.timer === state.timer);
      }
      for (const b of presetsEl.querySelectorAll(".preset")) {
        b.classList.toggle("active", b.dataset.id === state.activePreset);
      }
      playBtn.textContent = state.playing ? "■ 정지" : "▶ 재생";
      playBtn.classList.toggle("stop", state.playing);
      playBtn.setAttribute("aria-pressed", state.playing ? "true" : "false");
    }

    function buildPresets() {
      presetsEl.innerHTML = "";
      for (const p of PRESETS) {
        const b = document.createElement("button");
        b.className = "preset";
        b.dataset.id = p.id;
        b.innerHTML = `<div class="name">${p.emoji} ${p.name}</div><div class="hz">${fmtHz(p.hz)} · ${p.wave}${p.sweep !== "off" ? " · sweep" : ""}</div>`;
        b.addEventListener("click", () => applyPreset(p));
        presetsEl.appendChild(b);
      }
    }

    function applyPreset(p) {
      state.freq = p.hz;
      state.wave = p.wave;
      state.sweep = p.sweep;
      state.activePreset = p.id;
      if (state.playing) restartTone();
      saveState();
      render();
    }

    function ensureCtx() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === "suspended") ctx.resume();
    }

    function startTone() {
      ensureCtx();
      osc = ctx.createOscillator();
      gain = ctx.createGain();
      if (!analyser) {
        analyser = ctx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.85;
        analyser.connect(ctx.destination);
      }
      osc.type = state.wave;
      osc.frequency.value = state.freq;
      gain.gain.value = 0;
      osc.connect(gain).connect(analyser);
      osc.start();
      if (state.detune > 0) startOsc2();
      // soft ramp-in to avoid clicks
      const now = ctx.currentTime;
      gain.gain.linearRampToValueAtTime(state.volume, now + 0.05);
      startSweep();
      startVis();
      startTimer();
    }

    function stopTone() {
      stopSweep();
      stopVis();
      stopTimer();
      if (gain && ctx) {
        const now = ctx.currentTime;
        gain.gain.cancelScheduledValues(now);
        gain.gain.setValueAtTime(gain.gain.value, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.05);
      }
      if (osc) {
        try { osc.stop(ctx.currentTime + 0.08); } catch {}
      }
      stopOsc2();
      osc = null;
      gain = null;
    }

    function startOsc2() {
      if (!ctx || !gain || osc2) return;
      osc2 = ctx.createOscillator();
      osc2.type = state.wave;
      osc2.frequency.value = state.freq + state.detune;
      osc2.connect(gain);
      osc2.start();
    }

    function stopOsc2() {
      if (!osc2) return;
      try { osc2.stop(ctx.currentTime + 0.08); } catch {}
      osc2 = null;
    }

    function restartTone() {
      stopTone();
      startTone();
    }

    function startSweep() {
      stopSweep();
      if (state.sweep === "off" || !osc) return;
      if (state.sweep === "random") {
        sweepTimer = setInterval(() => {
          if (!osc) return;
          const f = Math.round(14000 + Math.random() * 8000);
          osc.frequency.setTargetAtTime(f, ctx.currentTime, 0.05);
          if (osc2) osc2.frequency.setTargetAtTime(f + state.detune, ctx.currentTime, 0.05);
          freqDisplay.textContent = f;
          freqVal.textContent = fmtHz(f);
        }, 4000);
        return;
      }
      const stepMs = state.sweep === "fast" ? 60 : 180;
      const span = 1500; // ±1.5 kHz around current
      const baseFreq = state.freq;
      let t = 0;
      sweepDir = 1;
      sweepTimer = setInterval(() => {
        if (!osc) return;
        t += stepMs;
        const phase = Math.sin((t / (state.sweep === "fast" ? 800 : 2400)) * Math.PI * 2);
        const f = Math.max(50, Math.min(22000, baseFreq + phase * span));
        osc.frequency.setTargetAtTime(f, ctx.currentTime, 0.02);
        if (osc2) osc2.frequency.setTargetAtTime(f + state.detune, ctx.currentTime, 0.02);
      }, stepMs);
    }

    function stopSweep() {
      if (sweepTimer) clearInterval(sweepTimer);
      sweepTimer = null;
    }

    function startVis() {
      if (!analyser) return;
      cancelAnimationFrame(rafId);
      const bins = analyser.frequencyBinCount;
      const data = new Uint8Array(bins);
      const nyq = ctx.sampleRate / 2;
      const maxHz = 24000;
      const usableBins = Math.min(bins, Math.floor((maxHz / nyq) * bins));
      const draw = () => {
        analyser.getByteFrequencyData(data);
        const w = canvas.width, h = canvas.height;
        cctx.clearRect(0, 0, w, h);
        const barW = w / usableBins;
        for (let i = 0; i < usableBins; i++) {
          const v = data[i] / 255;
          const bh = v * h;
          const hue = 150 + (i / usableBins) * 60;
          cctx.fillStyle = `hsl(${hue}, 70%, 55%)`;
          cctx.fillRect(i * barW, h - bh, Math.max(1, barW - 0.5), bh);
        }
        rafId = requestAnimationFrame(draw);
      };
      rafId = requestAnimationFrame(draw);
    }

    function stopVis() {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
      cctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function startTimer() {
      stopTimer();
      if (state.timer === "off") return;
      const min = Number(state.timer);
      if (!min) return;
      timerHandle = setTimeout(() => {
        if (state.playing) {
          state.playing = false;
          stopTone();
          render();
        }
      }, min * 60 * 1000);
    }

    function stopTimer() {
      if (timerHandle) clearTimeout(timerHandle);
      timerHandle = null;
    }

    // events
    freqInput.addEventListener("input", () => {
      state.freq = Number(freqInput.value);
      state.activePreset = null;
      if (osc) osc.frequency.setTargetAtTime(state.freq, ctx.currentTime, 0.01);
      if (osc2) osc2.frequency.setTargetAtTime(state.freq + state.detune, ctx.currentTime, 0.01);
      saveState();
      render();
    });

    volInput.addEventListener("input", () => {
      state.volume = Number(volInput.value) / 100;
      if (state.volume > 0) lastNonZeroVolume = state.volume;
      if (gain && ctx) gain.gain.setTargetAtTime(state.volume, ctx.currentTime, 0.02);
      saveState();
      render();
    });

    waveToggle.addEventListener("click", (e) => {
      const btn = e.target.closest(".chip");
      if (!btn) return;
      state.wave = btn.dataset.wave;
      if (osc) osc.type = state.wave;
      if (osc2) osc2.type = state.wave;
      saveState();
      render();
    });

    detuneInput.addEventListener("input", () => {
      state.detune = Number(detuneInput.value);
      if (state.playing) {
        if (state.detune > 0 && !osc2) startOsc2();
        else if (state.detune === 0 && osc2) stopOsc2();
        else if (osc2) osc2.frequency.setTargetAtTime(state.freq + state.detune, ctx.currentTime, 0.01);
      }
      saveState();
      render();
    });

    sweepToggle.addEventListener("click", (e) => {
      const btn = e.target.closest(".chip");
      if (!btn) return;
      state.sweep = btn.dataset.sweep;
      if (state.playing) {
        stopSweep();
        startSweep();
      }
      saveState();
      render();
    });

    timerToggle.addEventListener("click", (e) => {
      const btn = e.target.closest(".chip");
      if (!btn) return;
      state.timer = btn.dataset.timer;
      if (state.playing) startTimer();
      saveState();
      render();
    });

    playBtn.addEventListener("click", () => {
      state.playing = !state.playing;
      if (state.playing) startTone(); else stopTone();
      render();
    });

    $("reset").addEventListener("click", () => {
      if (!confirm("모든 설정을 초기값으로 되돌릴까요?")) return;
      if (state.playing) {
        state.playing = false;
        stopTone();
      }
      Object.assign(state, INITIAL_STATE);
      state.activePreset = null;
      lastNonZeroVolume = INITIAL_STATE.volume;
      try { localStorage.removeItem(LS_KEY); } catch {}
      render();
    });

    window.addEventListener("keydown", (e) => {
      const tag = (e.target.tagName || "").toLowerCase();
      if (tag === "input" || tag === "textarea" || tag === "select") return;
      if (e.key === " ") {
        e.preventDefault();
        playBtn.click();
        return;
      }
      if (/^[1-6]$/.test(e.key)) {
        const idx = Number(e.key) - 1;
        if (PRESETS[idx]) applyPreset(PRESETS[idx]);
        return;
      }
      if (e.key === "ArrowUp" || e.key === "ArrowDown") {
        e.preventDefault();
        const step = e.shiftKey ? 1000 : 100;
        const next = state.freq + (e.key === "ArrowUp" ? step : -step);
        state.freq = Math.max(100, Math.min(22000, next));
        state.activePreset = null;
        if (osc) osc.frequency.setTargetAtTime(state.freq, ctx.currentTime, 0.01);
        if (osc2) osc2.frequency.setTargetAtTime(state.freq + state.detune, ctx.currentTime, 0.01);
        saveState();
        render();
        return;
      }
      if (e.key === "m" || e.key === "M") {
        if (state.volume > 0) {
          lastNonZeroVolume = state.volume;
          state.volume = 0;
        } else {
          state.volume = lastNonZeroVolume || 0.4;
        }
        if (gain && ctx) gain.gain.setTargetAtTime(state.volume, ctx.currentTime, 0.02);
        saveState();
        render();
        return;
      }
    });

    // pause when tab hidden to save battery / avoid surprise
    document.addEventListener("visibilitychange", () => {
      if (document.hidden && state.playing) {
        state.playing = false;
        stopTone();
        render();
      }
    });

    loadState();
    buildPresets();
    render();
  </script>
</body>
